            <div id="search_bar">
                <form method="get" action="//autocomplete.wunderground.com/aq" id="srchfrm">
                    <input type="search" name="query" id="query">
                    <input type="submit" name="submit" value="Search" id="send">
                </form>

                <section id="searchResults">
                    <h2>Search Results</h2>
                </section>

                <h2 id="where"></h2>
            </div>

            <div>
                <div id="content_wrapper">
                    <section class="overview">
                        <h2>Current Temp F</h2>
                        <h2 id="currentTemp"></h2>
                        <h2><title>Today's High's and Low's</title></h2>
                        <h2 id="temp"></h2>
                    </section>

                    <section class="cur_conditions">
                        <h3>Current Conditions</h3>
                        <h3 id="wind"></h3>
                        <h3 id="precipitation"></h3>
                    </section>

                    <section class="hourly">
                        <h2>Hourly Forecast:</h2>
                    </section>
                </div>
